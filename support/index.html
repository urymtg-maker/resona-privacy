<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サポート — Resona</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #0A0E2A;
      color: #e8eaf6;
      line-height: 1.8;
      padding: 0 0 64px;
    }
    header {
      background: #141836;
      border-bottom: 1px solid #2a2e55;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo { font-size: 20px; font-weight: 800; color: #FF2D78; letter-spacing: -0.5px; }
    .logo a { color: inherit; text-decoration: none; }
    .page-title { font-size: 14px; color: #8890B5; }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 24px; }
    p { color: #b0b8d8; margin-bottom: 16px; }
    .card {
      background: #141836;
      border: 1px solid #2a2e55;
      border-radius: 14px;
      padding: 24px 28px;
      margin-top: 32px;
    }
    .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: #e8eaf6; }
    .card p { margin: 0; }
    a.mail {
      color: #FF2D78;
      text-decoration: none;
      font-weight: 600;
    }
    a.mail:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div class="logo"><a href="../">Resona</a></div>
    <div class="page-title">サポート</div>
  </header>
  <main>
    <h1>サポート</h1>
    <p>Resona をご利用いただきありがとうございます。<br>お困りのことがあれば、以下のメールアドレスまでお問い合わせください。</p>
    <p>通常、数日以内にご返信いたします。</p>
    <div class="card">
      <h2>お問い合わせ</h2>
      <p><a class="mail" href="mailto:resona.sns@gmail.com">resona.sns@gmail.com</a></p>
    </div>
  </main>
</body>
</html>
