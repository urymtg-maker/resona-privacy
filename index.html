<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resona — 法的情報</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #0A0E2A;
      color: #e8eaf6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    .logo {
      font-size: 32px;
      font-weight: 800;
      color: #FF2D78;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .tagline {
      color: #8890B5;
      font-size: 14px;
      margin-bottom: 40px;
    }
    .links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    a {
      display: block;
      padding: 16px 32px;
      background: #141836;
      border: 1px solid #2a2e55;
      border-radius: 14px;
      color: #FF2D78;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    a:hover { border-color: #FF2D78; }
  </style>
</head>
<body>
  <div class="logo">Resona</div>
  <div class="tagline">音楽で今をつなげる</div>
  <div class="links">
    <a href="./privacy/">プライバシーポリシー</a>
    <a href="./terms/">利用規約</a>
  </div>
</body>
</html>
